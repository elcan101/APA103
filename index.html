<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tables</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        table {
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        th, td {
            border: 2px solid black;
            padding: 10px;
            text-align: center;
        }

        .outer {
            border: 3px solid black;
            display: inline-block;
            padding: 10px;
        }
    </style>
</head>
<body>

    <!-- Table 1 -->
    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Country</th>
        </tr>
        <tr>
            <td>Harry Depp</td>
            <td>28</td>
            <td>Britain</td>
        </tr>
        <tr>
            <td>John Smith</td>
            <td>35</td>
            <td>USA</td>
        </tr>
        <tr>
            <td>Ram Krishna</td>
            <td>19</td>
            <td>Nepal</td>
        </tr>
    </table>

    <!-- Table 2 -->
    <div class="outer">
        <table>
            <tr>
                <th>Product</th>
                <th>Quantity</th>
            </tr>
            <tr>
                <td>Butter</td>
                <td>3 Kilogram</td>
            </tr>
            <tr>
                <td>Milk</td>
                <td>3 Liters</td>
            </tr>
        </table>
    </div>

    <br><br>

    <!-- Table 3 -->
    <div class="outer">
        <table>
            <tr>
                <th>Product</th>
                <th>Flavors</th>
            </tr>
            <tr>
                <td rowspan="3">Milk</td>
                <td>Almond</td>
            </tr>
            <tr>
                <td>Mango</td>
            </tr>
            <tr>
                <td>Chocolate</td>
            </tr>
            <tr>
                <td colspan="2">These are exclusive flavors</td>
            </tr>
        </table>
    </div>

</body>
</html>
